# Multi-objective Bayesian optimization with qLogEHVI.
#
# A 2-objective synthetic problem: minimize two competing quadratics with
# different centers. The Pareto front trades off proximity to each center.
#
# Requires the [bo] extra for BoTorch's hypervolume-improvement acquisition.

name: multi-objective-example
workspace: /tmp/polarisopt-multi
seed: 17

simulator:
  # The mock simulator only ships single-objective benchmarks; for a real
  # multi-objective study you'd plug in a custom Simulator that writes
  # multiple keys into outputs.json (see Tutorial 03). For demonstration
  # purposes this example uses two phases stacked.
  type: mock
  options:
    function: quadratic

runner:
  type: local
  options: {}

parameters:
  inline:
    - { name: x1, file: dummy.json, min: -2.0, max: 2.0 }
    - { name: x2, file: dummy.json, min: -2.0, max: 2.0 }

metric:
  type: identity
  options:
    keys: value

# NOTE: This is a placeholder sequential phase. To exercise qehvi properly,
# author a custom Simulator + Metric pair that yields a 2-vector. The YAML
# shape below illustrates how qehvi is configured.
phases:
  - name: warmup
    type: static
    design:
      type: lhs
      options:
        n: 12

  - name: pareto-bo
    type: sequential
    generator:
      type: acquisition
      options:
        surrogate:
          type: mtgp           # multi-task GP for correlated outputs
          options: { rank: 1 }
        acquisition:
          type: qehvi          # batch expected hypervolume improvement
          options:
            ref_point: [10.0, 10.0]
            mc_samples: 128
    batch_size: 4
    minimize: true
    stop:
      type: any
      criteria:
        - { type: max_iter, options: { n: 20 } }
        - type: hypervolume
          options:
            ref_point: [10.0, 10.0]
            tol: 1e-3
            patience: 5
