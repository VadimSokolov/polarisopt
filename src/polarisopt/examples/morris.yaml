# Morris screening — rank parameters by influence with a one-shot design.
# Use this *before* a sequential BO study to pick which parameters matter.
#
# Output: 50 evaluations of the Rosenbrock function. Run the analysis with
# SALib (see tutorials/02-morris-screening.md).

name: morris-example
workspace: /tmp/polarisopt-morris
seed: 7

simulator:
  type: mock
  options:
    function: rosenbrock

runner:
  type: local
  options: {}

parameters:
  inline:
    - { name: x1, file: dummy.json, min: -2.0, max: 2.0 }
    - { name: x2, file: dummy.json, min: -2.0, max: 2.0 }
    - { name: x3, file: dummy.json, min: -2.0, max: 2.0 }
    - { name: x4, file: dummy.json, min: -2.0, max: 2.0 }

metric:
  type: identity
  options:
    keys: value

phases:
  - name: morris
    type: static
    design:
      type: morris
      options:
        n_trajectories: 10  # → 10 * (4+1) = 50 evaluations
        num_levels: 4
