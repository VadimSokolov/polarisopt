site_name: polarisopt
site_description: Modular design-of-experiments and Bayesian optimization for POLARIS
site_url: https://anl-polaris.github.io/polaris-hpc/
repo_url: https://github.com/anl-polaris/polaris-hpc
repo_name: anl-polaris/polaris-hpc
edit_uri: edit/master/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - search.share
  palette:
    - scheme: default
      primary: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_api_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            separate_signature: true
            line_length: 100
            merge_init_into_class: true
            docstring_style: numpy
            docstring_section_style: spacy
            members_order: source
            filters: ["!^_"]
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tutorials:
      - tutorials/index.md
      - "01 · Branin demo": tutorials/01-branin-demo.md
      - "02 · Morris screening": tutorials/02-morris-screening.md
      - "03 · Multi-objective": tutorials/03-multi-objective.md
      - "04 · Restart": tutorials/04-restart.md
      - "05 · First POLARIS run": tutorials/05-first-polaris.md
      - "06 · Writing a plugin": tutorials/06-write-a-plugin.md
      - "Taxi demo": taxidemo.md
  - How-to guides:
      - how-to/index.md
      - Add a new design: how-to/add-design.md
      - Swap surrogate: how-to/swap-surrogate.md
      - Run on Slurm: how-to/run-on-slurm.md
      - Use Globus: how-to/use-globus.md
      - Migrate from EQSQL: how-to/migrate-from-eqsql.md
      - Debug failed samples: how-to/debug-failed-samples.md
  - Concepts:
      - concepts/index.md
      - Master/slave architecture: concepts/master-slave.md
      - Plugin registries: concepts/plugin-registries.md
      - Bayesian optimization: concepts/bayesian-optimization.md
      - Multi-objective: concepts/multi-objective.md
      - Restart correctness: concepts/restart-correctness.md
  - Notebooks:
      - notebooks/index.md
      - Convergence plots: notebooks/convergence.md
      - Pareto front: notebooks/pareto-front.md
      - Morris sensitivity: notebooks/morris.md
      - Compare two studies: notebooks/compare-runs.md
  - Reference:
      - Study YAML schema: yaml-reference.md
      - CLI: reference/cli.md
      - Architecture: architecture.md
      - EQSQL compatibility: eqsql-compat.md
      - Restart and resume: restart.md
      - Plugin authoring: plugins.md
      - API: reference/api/
  - For AI agents:
      - AGENTS.md: agents.md
      - llms.txt: llms-txt.md
  - Changelog: changelog.md
