# Workflow 2b — Morris elementary-effects screening on the local machine.
# Same simulator and search space as lhs-local.yaml, but a Morris design:
# 8 trajectories x (4 params + 1) = 40 evaluations, from which SALib ranks
# each input's influence on profit (mu*) and its interaction/nonlinearity
# (sigma). Use this to decide which knobs are worth a BO budget.
#
#   polarisopt run studies/morris-local.yaml
#
# Analysis: notebooks/04_morris_screening.ipynb

name: taxi-morris
workspace: "{{ env.HOME }}/taxidemo-runs/morris-local"
seed: 42

simulator:
  type: taxi
  options:
    n_repeats: 3
    base_seed: 42
    max_steps: 1000
    grid_size: 5
    journey_frequency: 50

runner:
  type: local
  options: {}

parameters:
  inline:
    - { name: taxi_count,     file: inputs.json, min: 1, max: 100, type: int }
    - { name: base_fare,      file: inputs.json, min: 0, max: 15 }
    - { name: cost_per_tile,  file: inputs.json, min: 1, max: 20 }
    - { name: max_multiplier, file: inputs.json, min: 1, max: 3 }

# Single objective: SALib's Morris analysis wants one Y per sample.
metric:
  type: identity
  options:
    keys: profit

phases:
  - name: morris
    type: static
    design:
      type: morris
      options:
        n_trajectories: 8
        num_levels: 4     # keep in sync with the analysis notebook
