# Workflow 2 — Latin-hypercube screening of the taxi simulator on the
# local machine. No cluster, no POLARIS: 64 designs x 3 seeded repeats,
# each evaluated in a slave subprocess via the local runner.
#
#   pip install -e ./taxidemo          # registers simulator type "taxi"
#   polarisopt validate studies/lhs-local.yaml
#   polarisopt run      studies/lhs-local.yaml
#   polarisopt status   studies/lhs-local.yaml
#
# Analysis: notebooks/02_lhs_local.ipynb (which can also launch this study
# directly from Python).

name: taxi-lhs
workspace: "{{ env.HOME }}/taxidemo-runs/lhs-local"
seed: 42

simulator:
  type: taxi
  options:
    n_repeats: 3          # average 3 seeded runs per design
    base_seed: 42
    max_steps: 1000       # playground default episode length
    grid_size: 5          # pinned: 5x5 road grid
    journey_frequency: 50 # pinned: 5 journey requests per 10 steps

runner:
  type: local
  options: {}

# The four pricing/fleet knobs from the playground, searched over their
# full slider ranges. `file` is where the staged values land in the
# per-sample workspace (the taxi simulator reads a single inputs.json).
parameters:
  inline:
    - { name: taxi_count,     file: inputs.json, min: 1, max: 100, type: int }
    - { name: base_fare,      file: inputs.json, min: 0, max: 15 }
    - { name: cost_per_tile,  file: inputs.json, min: 1, max: 20 }
    - { name: max_multiplier, file: inputs.json, min: 1, max: 3 }

# Multi-key identity metric: store the interesting outputs per sample so
# the analysis notebook gets them straight from the SampleStore.
metric:
  type: identity
  options:
    keys: [profit, missed, pick_up_time, journeys_completed]

phases:
  - name: lhs
    type: static
    design:
      type: lhs
      options:
        n: 64
